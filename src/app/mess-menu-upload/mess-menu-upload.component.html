<div class="container">
  <h1>Upload Mess Menu</h1>

  <form #data="ngForm" class="mess-form">
    <div class="selectors-row">
      <select
        id="hostel-select"
        class="form-select"
        name="hostel"
        [(ngModel)]="selectedHostel"
        [disabled]="true"
        aria-label="Selected Hostel"
      >
        <option *ngIf="selectedHostel" [value]="selectedHostel">{{ selectedHostel }}</option>
        <option *ngIf="!selectedHostel" value="">Fetching hostel...</option>

        <ng-container *ngFor="let allowed of allowedHostels; let i = index">
          <option *ngIf="allowed && i !== 21" [value]="'H' + i">H{{ i }}</option>
          <option *ngIf="allowed && i === 21" value="TANSA">TANSA</option>
        </ng-container>
      </select>

      <select class="form-select" name="upload" [(ngModel)]="uploadType" aria-label="Select Upload Type">
        <option value="" disabled selected>Select Upload Type</option>
        <option value="excel">Excel File Upload</option>
        <!-- <option value="google_sheet">Google Sheet Link</option> -->
      </select>
    </div>

    <div class="upload-row" *ngIf="uploadType">
      
      <div *ngIf="uploadType === 'excel'" class="input-wrapper">
        <input type="file" (change)="onFileSelect($event)" accept=".xlsx,.xls" class="file-input" aria-label="Upload Excel File" />
      </div>

      <!-- <div *ngIf="uploadType === 'google_sheet'" class="input-wrapper">
        <input 
          type="text" 
          class="form-control sheet-input" 
          placeholder="Paste Google Sheet link"
          [(ngModel)]="sheetUrl"
          name="sheetUrl"
          aria-label="Google Sheet Link"
        />
      </div> -->

      <button type="submit" class="btn-upload" (click)="onUpload()" [disabled]="isUploading">
        <span *ngIf="!isUploading">Upload Data</span>
        <span *ngIf="isUploading" class="button-loading">
          <mat-spinner diameter="20" [strokeWidth]="2"></mat-spinner>
          Processing...
        </span>
      </button>

      <div class="testing-option" *ngIf="environment.llmTesting">
        <label>
          <input type="checkbox" [checked]="environment.llmTesting" aria-label="Test with Multiple LLMs" />
          Test with Multiple LLMs
        </label>
      </div>
    </div>

    <!-- Menu Preview Table -->
    <app-menu-preview *ngIf="menuID && parsedMenuData" [menuData]="parsedMenuData"></app-menu-preview>

    <!-- Approve/Reject Buttons (visible after successful upload) -->
    <div class="approval-row" *ngIf="menuID && !uploadType">
      <div class="approval-buttons">
        <button type="button" class="btn-approve" (click)="onApproval()" [disabled]="isApproving || isRejecting">
          <span *ngIf="!isApproving">Approve</span>
          <span *ngIf="isApproving" class="button-loading">
            <mat-spinner diameter="20" [strokeWidth]="2"></mat-spinner>
            Processing...
          </span>
        </button>
        <button type="button" class="btn-reject" (click)="onRejection()" [disabled]="isApproving || isRejecting">
          <span *ngIf="!isRejecting">Reject</span>
          <span *ngIf="isRejecting" class="button-loading">
            <mat-spinner diameter="20" [strokeWidth]="2"></mat-spinner>
            Processing...
          </span>
        </button>
      </div>
    </div>
  </form>
</div>
